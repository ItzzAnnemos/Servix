const StarRating = ({ rating, size = 16, showValue = false, className = "" }) => {
  const stars = [];
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(rating)) {
      stars.push(<Icon key={i} name="star" size={size} className={`star-filled ${className}`} />);
    } else if (i === Math.ceil(rating) && rating % 1 !== 0) {
      stars.push(<Icon key={i} name="starHalf" size={size} className={`star-filled ${className}`} />);
    } else {
      stars.push(<Icon key={i} name="starOutline" size={size} className={`star-empty ${className}`} />);
    }
  }
  return <div className="flex items-center gap-0.5">{stars}{showValue && <span className="ml-1 text-sm font-medium text-slate-600">{rating.toFixed(1)}</span>}</div>;
};

  };
  return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[color] || colors.blue}`}>{children}</span>;

// ─── App Component ───
function App() {
  const [page, setPage] = useState("landing");
  const [craftsmen, setCraftsmen] = useState(initialCraftsmen);
  const [bookings, setBookings] = useState(initialBookings);
  const [selectedCraftsman, setSelectedCraftsman] = useState(null);
  const [selectedBooking, setSelectedBooking] = useState(null);
  const [userRole, setUserRole] = useState(null); // 'client' or 'provider'
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  const navigate = (target, craftsman = null, booking = null) => {
    setPage(target);
    if (craftsman) setSelectedCraftsman(craftsman);
    if (booking) setSelectedBooking(booking);
    setMobileMenuOpen(false);
    window.scrollTo(0, 0);
  };

  const addReview = (craftsmanId, review) => {
    setCraftsmen(prev => prev.map(c => {
      if (c.id !== craftsmanId) return c;
      const newReviews = [review, ...c.reviews];
      const newCount = c.reviewCount + 1;
      const newRating = ((c.rating * c.reviewCount) + review.rating) / newCount;
      const newBreakdown = { ...c.ratingBreakdown };
      newBreakdown[review.rating] = (newBreakdown[review.rating] || 0) + 1;
      return { ...c, reviews: newReviews, reviewCount: newCount, rating: Math.round(newRating * 10) / 10, ratingBreakdown: newBreakdown };
    }));
    setBookings(prev => prev.map(b => b.id === selectedBooking?.id ? { ...b, reviewed: true } : b));
  };

  const updateBookingStatus = (bookingId, status) => {
    setBookings(prev => prev.map(b => b.id === bookingId ? { ...b, status } : b));
  };

  const addBooking = (booking) => {
    setBookings(prev => [booking, ...prev]);
  };

  const renderPage = () => {
    switch (page) {
      case "landing": return <LandingPage navigate={navigate} setUserRole={setUserRole} />;
      case "browse": return <BrowsePage navigate={navigate} craftsmen={craftsmen} />;
      case "profile": return <CraftsmanProfilePage navigate={navigate} craftsman={selectedCraftsman} />;
      case "book": return <BookServicePage navigate={navigate} craftsman={selectedCraftsman} addBooking={addBooking} />;
      case "dashboard": return <CraftsmanDashboard navigate={navigate} craftsmen={craftsmen} bookings={craftsmanBookings} updateBookingStatus={updateBookingStatus} />;
      case "review": return <ReviewPage navigate={navigate} booking={selectedBooking} craftsman={craftsmen.find(c => c.id === selectedBooking?.craftsmanId)} addReview={addReview} />;
      case "clientBookings": return <ClientBookingsPage navigate={navigate} bookings={bookings} craftsmen={craftsmen} />;
      default: return <LandingPage navigate={navigate} setUserRole={setUserRole} />;
    }
  };

  return (
    <div className="min-h-screen bg-slate-50">
      <Navbar page={page} navigate={navigate} userRole={userRole} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} />
      <main className="fade-in">
        {renderPage()}
      </main>
      {page !== "landing" && <Footer navigate={navigate} />}
    </div>
  );
}

  const [minRating, setMinRating] = useState(0);
  const [sortBy, setSortBy] = useState("rating");

  const filtered = useMemo(() => {
    let result = craftsmen.filter(c => {
      const matchesSearch = c.name.toLowerCase().includes(search.toLowerCase()) ||
        c.services.some(s => s.toLowerCase().includes(search.toLowerCase())) ||
        c.bio.toLowerCase().includes(search.toLowerCase());
      const matchesCategory = activeCategory === "all" || c.category === activeCategory;
      const matchesRating = c.rating >= minRating;
      return matchesSearch && matchesCategory && matchesRating;
    });
    if (sortBy === "rating") result.sort((a, b) => b.rating - a.rating);
    if (sortBy === "experience") result.sort((a, b) => b.experience - a.experience);
    if (sortBy === "reviews") result.sort((a, b) => b.reviewCount - a.reviewCount);

    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

        <StatCard label="Pending" value={requests.filter(r => r.status === "pending").length} icon="clock" color="slate" />
      </div>

      {/* Tabs */}
      <div className="flex gap-1 mb-6 bg-slate-100 p-1 rounded-xl w-fit">
        <TabBtn active={activeTab === "requests"} onClick={() => setActiveTab("requests")} label="Booking Requests" />
        <TabBtn active={activeTab === "profile"} onClick={() => setActiveTab("profile")} label="Profile Editor" />
      </div>

      {activeTab === "requests" && (
        <div className="space-y-4">
          {requests.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-2xl border border-slate-200">
              <Icon name="clipboard" size={40} className="text-slate-300 mx-auto mb-4" />
              <h3 className="font-semibold text-slate-700 mb-1">No booking requests</h3>
              <p className="text-sm text-slate-500">New requests will appear here</p>
            </div>
          ) : (
            requests.map(req => (
              <div key={req.id} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center font-bold text-sm">
                      {req.clientName[0]}
                    </div>
                    <div>
                      <h3 className="font-semibold text-slate-800">{req.clientName}</h3>
                      <p className="text-sm text-slate-500">{req.service}</p>
                    </div>
                  </div>
                  <Badge color={req.status === "pending" ? "amber" : req.status === "accepted" ? "green" : "red"}>
                    {req.status === "pending" ? "Pending" : req.status === "accepted" ? "Accepted" : "Declined"}
                  </Badge>
                </div>
                <div className="grid sm:grid-cols-3 gap-3 mb-4 text-sm">
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="calendar" size={14} className="text-slate-400" />
                    {req.date}
                  </div>
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="clock" size={14} className="text-slate-400" />
                    {req.time}
                  </div>
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="dollarSign" size={14} className="text-slate-400" />
                    {req.price}
                  </div>
                </div>
                <p className="text-sm text-slate-600 bg-slate-50 rounded-lg p-3 mb-4">{req.description}</p>
                {req.status === "pending" && (
                  <div className="flex gap-3">
                    <button onClick={() => handleAction(req.id, "accepted")} className="flex-1 sm:flex-none btn-trust text-white px-5 py-2.5 rounded-xl font-semibold text-sm shadow-sm hover:shadow transition flex items-center justify-center gap-2">
                      <Icon name="check" size={16} />
                      Accept
                    </button>
                    <button onClick={() => handleAction(req.id, "declined")} className="flex-1 sm:flex-none px-5 py-2.5 rounded-xl font-semibold text-sm text-red-600 border border-red-200 hover:bg-red-50 transition flex items-center justify-center gap-2">
                      <Icon name="x" size={16} />
                      Decline
                    </button>
                  </div>
                )}
              </div>
            ))
          )}
        </div>
      )}

      {activeTab === "profile" && (
        <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-6">
          <div className="flex items-center gap-4 mb-2">
            <div className="w-16 h-16 rounded-xl bg-gradient-to-br from-brand-100 to-brand-200 flex items-center justify-center text-brand-700 font-bold text-xl">
              {myProfile.name.split(" ").map(n => n[0]).join("")}
            </div>
            <div>
              <h3 className="font-bold text-slate-800">{myProfile.name}</h3>
              <p className="text-sm text-slate-500">{categories.find(c => c.id === myProfile.category)?.label}</p>
            </div>
          </div>

          <div className="grid sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-2">Display Name</label>
              <input type="text" defaultValue={myProfile.name} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-brand-400 outline-none text-sm" />
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-2">Years of Experience</label>
              <input type="number" defaultValue={myProfile.experience} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-brand-400 outline-none text-sm" />
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-2">Bio</label>
            <textarea defaultValue={myProfile.bio} rows={4} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-brand-400 outline-none text-sm resize-none" />
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-2">Services Offered</label>
            <div className="flex flex-wrap gap-2">
              {myProfile.services.map((s, i) => (
                <span key={i} className="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-brand-50 text-brand-700 text-sm font-medium border border-brand-100">
                  {s}
                  <button className="hover:text-brand-900"><Icon name="x" size={14} /></button>
                </span>
              ))}
              <button className="px-3 py-1.5 rounded-lg border border-dashed border-slate-300 text-slate-400 text-sm hover:border-brand-300 hover:text-brand-500 transition">
                + Add Service
              </button>
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-2">Availability</label>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map(day => (
                <label key={day} className="flex items-center gap-2 p-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition">
                  <input type="checkbox" defaultChecked={day !== "Sun"} className="w-4 h-4 rounded border-slate-300 text-brand-600" />
                  <span className="text-sm font-medium text-slate-700">{day}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="flex gap-3 pt-2">
            <button className="btn-primary text-white px-6 py-2.5 rounded-xl font-semibold text-sm shadow-sm hover:shadow transition flex items-center gap-2">
              <Icon name="check" size={16} />
              Save Changes
            </button>
            <button className="px-6 py-2.5 rounded-xl font-semibold text-sm text-slate-600 border border-slate-200 hover:bg-slate-50 transition">
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, icon, color }) {
  const colors = {
    blue: "bg-brand-50 text-brand-600",
    amber: "bg-amber-50 text-amber-600",
    green: "bg-trust-50 text-trust-600",
    slate: "bg-slate-100 text-slate-600",
  };
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
      <div className={`w-10 h-10 rounded-xl ${colors[color]} flex items-center justify-center mb-3`}>
        <Icon name={icon} size={20} />
      </div>
      <div className="text-2xl font-extrabold text-slate-800">{value}</div>
      <div className="text-sm text-slate-500">{label}</div>
    </div>
  );
}

function TabBtn({ active, onClick, label }) {
  return (
    <button onClick={onClick} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${active ? "bg-white text-slate-800 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}>
      {label}
    </button>
  );
}

// ─── Client Bookings Page ───
function ClientBookingsPage({ navigate, bookings, craftsmen }) {
  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
      <div className="mb-6">
        <h1 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-1">My Bookings</h1>
        <p className="text-slate-500">Track your service requests and leave reviews</p>
      </div>

      <div className="space-y-4">
        {bookings.length === 0 ? (
          <div className="text-center py-16 bg-white rounded-2xl border border-slate-200">
            <Icon name="clipboard" size={40} className="text-slate-300 mx-auto mb-4" />
            <h3 className="font-semibold text-slate-700 mb-1">No bookings yet</h3>
            <p className="text-sm text-slate-500 mb-4">Find a craftsman and book your first service</p>
            <button onClick={() => navigate("browse")} className="btn-primary text-white px-5 py-2.5 rounded-xl font-semibold text-sm shadow-sm hover:shadow transition">
              Browse Craftsmen
            </button>
          </div>
        ) : (
          bookings.map(booking => {
            const craftsman = craftsmen.find(c => c.id === booking.craftsmanId);
            return (
              <div key={booking.id} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-100 to-brand-200 flex items-center justify-center text-brand-700 font-bold text-sm">
                      {craftsman?.name.split(" ").map(n => n[0]).join("")}
                    </div>
                    <div>
                      <h3 className="font-semibold text-slate-800">{craftsman?.name}</h3>
                      <p className="text-sm text-slate-500">{booking.service}</p>
                    </div>
                  </div>
                  <Badge color={booking.status === "completed" ? "green" : booking.status === "pending" ? "amber" : "blue"}>
                    {booking.status === "completed" ? "Completed" : booking.status === "pending" ? "Pending" : "Confirmed"}
                  </Badge>
                </div>
                <div className="grid sm:grid-cols-3 gap-3 mb-4 text-sm">
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="calendar" size={14} className="text-slate-400" />
                    {booking.date}
                  </div>
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="clock" size={14} className="text-slate-400" />
                    {booking.time}
                  </div>
                  <div className="flex items-center gap-2 text-slate-600">
                    <Icon name="dollarSign" size={14} className="text-slate-400" />
                    {booking.price}
                  </div>
                </div>
                <div className="flex gap-2">
                  {booking.status === "completed" && !booking.reviewed && (
                    <button onClick={() => navigate("review", null, booking)} className="btn-trust text-white px-4 py-2 rounded-lg font-semibold text-sm shadow-sm hover:shadow transition flex items-center gap-2">
                      <Icon name="star" size={14} />
                      Leave Review
                    </button>
                  )}
                  {booking.status === "completed" && booking.reviewed && (
                    <span className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-100 text-slate-500 text-sm font-medium">
                      <Icon name="check" size={14} />
                      Reviewed
                    </span>
                  )}
                  <button onClick={() => navigate("profile", craftsman)} className="px-4 py-2 rounded-lg text-sm font-medium text-brand-600 hover:bg-brand-50 transition">
                    View Profile
                  </button>
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

// ─── Review Page ───
function ReviewPage({ navigate, booking, craftsman, addReview }) {
  const [rating, setRating] = useState(0);
  const [hoverRating, setHoverRating] = useState(0);
  const [comment, setComment] = useState("");
  const [submitted, setSubmitted] = useState(false);

  if (!booking || !craftsman) return null;

  const handleSubmit = () => {
    if (rating === 0) return;
    addReview(craftsman.id, {
      id: Date.now(),
      author: "Demo User",
      rating,
      date: "Just now",
      text: comment,
    });
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="max-w-lg mx-auto px-4 sm:px-6 py-16 text-center">
        <div className="w-20 h-20 rounded-full bg-trust-100 flex items-center justify-center mx-auto mb-6">
          <Icon name="thumbsUp" size={40} className="text-trust-600" />
        </div>
        <h2 className="text-2xl font-bold text-slate-800 mb-2">Thank you!</h2>
        <p className="text-slate-500 mb-8">Your review helps others find great craftsmen.</p>
        <div className="flex flex-col sm:flex-row gap-3 justify-center">
          <button onClick={() => navigate("clientBookings")} className="btn-primary text-white px-6 py-3 rounded-xl font-semibold shadow-sm hover:shadow transition">
            Back to My Bookings
          </button>
          <button onClick={() => navigate("browse")} className="px-6 py-3 rounded-xl font-semibold text-slate-600 border border-slate-200 hover:bg-slate-50 transition">
            Browse More Pros
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="max-w-lg mx-auto px-4 sm:px-6 py-6 sm:py-8">
      <button onClick={() => navigate("clientBookings")} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-700 mb-6 transition">
        <Icon name="arrowLeft" size={16} />
        Back to bookings
      </button>

      <div className="mb-6">
        <h1 className="text-2xl font-bold text-slate-800 mb-1">Rate your experience</h1>
        <p className="text-slate-500">How was your service with {craftsman.name}?</p>
      </div>

      <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-6">
        {/* Booking Summary */}
        <div className="bg-slate-50 rounded-xl p-4 border border-slate-100">
          <div className="flex items-center gap-3 mb-3">
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-brand-100 to-brand-200 flex items-center justify-center text-brand-700 font-bold text-sm">
              {craftsman.name.split(" ").map(n => n[0]).join("")}
            </div>
            <div>
              <div className="font-semibold text-slate-800 text-sm">{craftsman.name}</div>
              <div className="text-xs text-slate-500">{booking.service} — {booking.date}</div>
            </div>
          </div>
        </div>

        {/* Star Rating */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-3">Your Rating</label>
          <div className="flex items-center gap-2">
            {[1, 2, 3, 4, 5].map(star => (
              <button
                key={star}
                onMouseEnter={() => setHoverRating(star)}
                onMouseLeave={() => setHoverRating(0)}
                onClick={() => setRating(star)}
                className="transition-transform hover:scale-110"
              >
                <Icon
                  name={star <= (hoverRating || rating) ? "star" : "starOutline"}
                  size={36}
                  className={star <= (hoverRating || rating) ? "star-filled" : "star-empty"}
                />
              </button>
            ))}
          </div>
          <p className="text-sm text-slate-400 mt-2">
            {rating === 5 && "Excellent!"}
            {rating === 4 && "Very good"}
            {rating === 3 && "Good"}
            {rating === 2 && "Fair"}
            {rating === 1 && "Poor"}
            {rating === 0 && "Tap a star to rate"}
          </p>
        </div>

        {/* Comment */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-2">Your Review (optional)</label>
          <textarea
            value={comment}
            onChange={e => setComment(e.target.value)}
            placeholder="What went well? What could be improved?"
            rows={4}
            className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none text-sm resize-none"
          />
        </div>

        <button
          onClick={handleSubmit}
          disabled={rating === 0}
          className="w-full btn-primary text-white py-3 rounded-xl font-semibold shadow-sm hover:shadow transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <Icon name="send" size={16} />
          Submit Review
        </button>
      </div>
    </div>
  );
}

// ─── Footer ───

  return (
    <footer className="bg-slate-900 text-slate-400 mt-16">
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-12">
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
          <div>
            <div className="flex items-center gap-2 mb-4">
              <div className="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center">
                <Icon name="wrench" size={16} className="text-white" />
              </div>
              <span className="font-bold text-lg text-white tracking-tight">Servix</span>
            </div>
            <p className="text-sm leading-relaxed">Connecting homeowners with trusted local craftsmen. Transparent, reliable, and hassle-free.</p>
          </div>
          <div>
            <h4 className="font-semibold text-white mb-4">For Clients</h4>
            <ul className="space-y-2 text-sm">
              <li><button onClick={() => navigate("browse")} className="hover:text-white transition">Find a Pro</button></li>
              <li><button onClick={() => navigate("clientBookings")} className="hover:text-white transition">My Bookings</button></li>
              <li><span className="hover:text-white transition cursor-pointer">How it Works</span></li>
            </ul>
          </div>
          <div>
            <h4 className="font-semibold text-white mb-4">For Craftsmen</h4>
            <ul className="space-y-2 text-sm">
              <li><button onClick={() => navigate("dashboard")} className="hover:text-white transition">Join as Pro</button></li>
              <li><span className="hover:text-white transition cursor-pointer">Success Stories</span></li>
              <li><span className="hover:text-white transition cursor-pointer">Pricing</span></li>
            </ul>
          </div>
          <div>
            <h4 className="font-semibold text-white mb-4">Support</h4>
            <ul className="space-y-2 text-sm">
              <li><span className="hover:text-white transition cursor-pointer">Help Center</span></li>
              <li><span className="hover:text-white transition cursor-pointer">Safety</span></li>
              <li><span className="hover:text-white transition cursor-pointer">Contact Us</span></li>
            </ul>
          </div>
        </div>
        <div className="border-t border-slate-800 pt-8 text-sm text-center">
          <p>© 2026 Servix. Demo MVP for presentation purposes.</p>
        </div>
      </div>
    </footer>
  );
}

// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
